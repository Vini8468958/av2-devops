name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Build Frontend Docker image
      run: docker build -t todo-frontend:latest ./frontend

    - name: Build Backend Docker image
      run: docker build -t todo-backend:latest ./backend

    - name: Verify Docker images
      run: |
        docker images
        docker run --rm todo-frontend:latest echo "Frontend image built successfully"
        docker run --rm todo-backend:latest echo "Backend image built successfully"

